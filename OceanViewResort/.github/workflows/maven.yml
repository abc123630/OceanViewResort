name: Build OceanViewResort Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - uses: actions/checkout@v3

      # 2. Set up Java
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      # 3. Cache Maven dependencies
      - uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Build the Maven project
      - name: Build with Maven
        run: mvn -f OceanViewResort/pom.xml clean install -DskipTests

      # 5. Run tests
      - name: Run Maven tests
        run: mvn -f OceanViewResort/pom.xml test